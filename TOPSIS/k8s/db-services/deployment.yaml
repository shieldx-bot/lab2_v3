apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-service
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: db-service
  template:
    metadata:
      labels:
        app: db-service
    spec:
      # schedulerName: my-scheduler
      containers:
      - name: db-service
        image: shieldxbot/go-db-service:v1.0.7
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "50Mi"
            cpu: "50m"
          limits:
            memory: "100Mi"
            cpu: "100m"
    
       