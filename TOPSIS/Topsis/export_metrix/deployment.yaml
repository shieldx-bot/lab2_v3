apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: multi-node-demo-worker
  namespace: default
spec:
  selector:
    matchLabels:
      app: multi-node-demo-worker
  template:
    metadata:
      labels:
        app: multi-node-demo-worker
      terminationGracePeriodSeconds: 15
      containers:
        - name: multi-node-demo-worker
          image: shieldxbot/topsis-metrix:v0.0.2
          imagePullPolicy: Always
          env:
            - name: NODE_ID
              value: "1"
            - name: REDIS_HOST
              value: redis.default.svc.cluster.local
            - name: POSTGRES_URI
              value: postgresql://postgres@metricdb-rw.default.svc.cluster.local:5432/postgres
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import socket, sys
                  for host in ["10.43.0.10", "redis.default.svc.cluster.local",
                               "metricdb-rw.default.svc.cluster.local"]:
                      try:
                          socket.gethostbyname(host)
                      except socket.gaierror:
                          sys.exit(1)
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import redis, sys
                  r = redis.Redis(host="redis.default.svc.cluster.local", port=6379, socket_timeout=3)
                  sys.exit(0 if r.ping() else 1)
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
