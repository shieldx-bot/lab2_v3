apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: api-services-scaledobj
  labels:
    app: api-services
spec:
  scaleTargetRef:
    kind: Deployment
    name: api-services
    
  minReplicaCount: 2
  maxReplicaCount: 8
  
  triggers:
  # Chỉ dùng CPU. Bỏ Memory.
  - type: cpu
    metricType: Utilization
    metadata:
      value: "60"
      
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        # Giảm từ từ sau khi bão qua (tránh chết lâm sàng nếu bão quay lại)
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
          - type: Pods
            value: 1
            periodSeconds: 60
          - type: Percent
            value: 20
            periodSeconds: 60
          selectPolicy: Max
        
        # MỞ RỘNG THẦN TỐC (Cực kỳ quan trọng cho Load Test)
        scaleUp:
          stabilizationWindowSeconds: 0 # Không chờ đợi, thấy tải cao là scale ngay
          policies:
          - type: Percent
            value: 100                  # Cho phép nhân đôi số lượng Pod
            periodSeconds: 15           # Phản ứng trong 15s (Thay vì 30s)
          - type: Pods
            value: 4                    # Tăng hẳn 4 Pods 1 lúc nếu cần
            periodSeconds: 15
          selectPolicy: Max