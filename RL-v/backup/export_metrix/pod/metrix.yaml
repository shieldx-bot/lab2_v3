apiVersion: v1
kind: Pod
metadata:
  name: selector-pod
  namespace: backend-0
spec:
  containers:
  - name: my-app
    image: nginx:latest
    env:
    - name: NODE_ID
      value: "0"
    - name: ENV_VARIABLE_2
      value: "value2"
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"

